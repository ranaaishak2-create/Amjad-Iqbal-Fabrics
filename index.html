<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amjad Fabric</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
}
nav{
    background:#333;
    text-align:center;
    padding:10px;
}
nav a{
    color:white;
    text-decoration:none;
    margin:15px;
}
.hero{
    background:#d9c8a9;
    text-align:center;
    padding:60px 20px;
}
.hero h1{
    font-size:40px;
}
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:40px;
}
.card{
    background:white;
    width:250px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}
.card h3,p{
    text-align:center;
}
button{
    background:black;
    color:white;
    border:none;
    padding:10px 20px;
    margin:15px auto;
    display:block;
    cursor:pointer;
}
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
<h1>AMJAD FABRIC</h1>
<p>Premium Men's & Women's Fabrics</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Men</a>
<a href="#">Women</a>

</nav>

<section class="hero">
<h1>Luxury Fabric Collection</h1>
<p>Best Quality Fabric Across Pakistan</p>
<button>Shop Now</button>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/250x250?text=Men+Fabric">
<h3>Men Wash & Wear</h3>
<p>Rs. 3,500</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x250?text=Women+Lawn">
<h3>Women Lawn Suit</h3>

<button>Buy Now</button>
</div>

<div class="card">

<p>Rs. 4,999</p>

</div>
